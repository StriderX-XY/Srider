<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StriderX‑XY - Produit</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">StriderX‑XY</div>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="catalogue.html">Catalogue</a>
    <a href="cart.html">Panier</a>
  </nav>
</header>

<section class="container product-detail">
  <div class="product-images">
    <img id="mainImage" src="images/shoe1_1.jpg" alt="Produit">
    <img src="images/shoe1_2.jpg" alt="Produit vue 2">
  </div>
  <div class="product-info">

    <p id="productDesc">Chaussures performantes pour tous types de course.</p>
    <p class="price" id="productPrice">150€</p>
    <label for="sizeSelect">Taille :</label>

      <option value="38">38</option>
      <option value="39">39</option>
      <option value="40">40</option>
      <option value="41">41</option>
      <option value="42">42</option>
      <option value="43">43</option>
      <option value="44">44</option>
    </select>
    <button id="addToCart" class="btn-primary">Ajouter au panier</button>
  </div>
</section>

<footer>
<p>&copy; 2026 StriderX‑XY. Tous droits réservés.</p>
<div>Suivez-nous : Facebook | Instagram | Twitter</div>
</footer>
